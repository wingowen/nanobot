; ==========================================
; Supervisor 主配置文件
; 路径: /app/supervisord.conf
; ==========================================

; --- 核心守护进程设置 ---
[supervisord]
; 日志文件路径 (主日志，记录 Supervisor 自身的运行信息)
logfile=/app/logs/supervisord.log

; 日志级别 (info, warn, error, critical, debug)
loglevel=info

; 进程 ID 文件
pidfile=/var/run/supervisord.pid

; 临时文件目录
childlogdir=/tmp

; 编码设置 (防止中文乱码)
environment=LANG="en_US.UTF-8",LC_ALL="en_US.UTF-8"

; --- 控制台接口设置 (用于 supervisorctl 命令) ---
[unix_http_server]
; 套接字文件路径
file=/var/run/supervisor.sock

; 权限设置 (允许 root 用户访问)
chmod=0700
chown=root:root

; --- 命令行控制工具设置 ---
[supervisorctl]
; 指定服务器接口
serverurl=unix:///var/run/supervisor.sock

; --- RPC 接口设置 (必需) ---
[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; --- 包含动态生成的配置 ---
; 这行代码至关重要，它会加载 /app/supervisor/ 目录下所有的 .conf 文件
; 你的 init_supervisor.sh 脚本正是向这里写入配置
[include]
files = /app/supervisor/*.conf